<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>\u0628\u0637\u0627\u0642\u0627\u062a \u062a\u0647\u0646\u0626\u0629 \u0627\u0644\u0639\u064a\u062f</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0f2027, #1a3a2a, #0f2027);
            min-height: 100vh;
            font-family: 'Tajawal', sans-serif;
            padding: 20px 15px 40px;
            color: #fff;
        }

        .header {
            text-align: center;
            padding: 30px 0 20px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            color: #C9A84C;
            letter-spacing: 1px;
            text-shadow: 0 0 30px rgba(201,168,76,0.4);
        }

        .header p {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin-top: 6px;
        }

        .container {
            max-width: 460px;
            margin: 0 auto;
        }

        /* Template Selector */
        .section-label {
            font-size: 13px;
            color: rgba(255,255,255,0.45);
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .template-grid {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
        }

        .template-card {
            flex: 1;
            cursor: pointer;
            border-radius: 14px;
            overflow: hidden;
            border: 2.5px solid transparent;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.05);
            position: relative;
        }

        .template-card:hover {
            transform: translateY(-3px);
            border-color: rgba(201,168,76,0.5);
        }

        .template-card.selected {
            border-color: #C9A84C;
            box-shadow: 0 0 20px rgba(201,168,76,0.3);
        }

        .template-card img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            display: block;
        }

        .template-card .check {
            display: none;
            position: absolute;
            top: 7px;
            left: 7px;
            width: 22px;
            height: 22px;
            background: #C9A84C;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .template-card.selected .check {
            display: flex;
        }

        .template-card span {
            display: block;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            padding: 8px 0;
            color: rgba(255,255,255,0.7);
        }

        .template-card.selected span {
            color: #C9A84C;
        }

        /* Input Fields */
        .input-group {
            margin-bottom: 14px;
        }

        .input-group textarea {
            width: 100%;
            padding: 16px
